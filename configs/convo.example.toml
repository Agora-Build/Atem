# atem serv convo — ConvoAI agent configuration
# Copy to ~/.config/atem/convo.toml (chmod 0600 — contains API keys)
#
# Override per-command via CLI: --channel, --rtc-user-id, --agent-user-id, --config
#
# The schema has two top-level sections atem cares about:
#   [atem]   — atem's runtime control surface (channel, RTC uid, HIPAA,
#              geofence, encryption, avatar opt-in)
#   [agent]  — everything about the AI agent (its uid, idle timeout,
#              presets, and the LLM / ASR / TTS / avatar provider blocks)
# plus pass-through tables atem forwards verbatim to ConvoAI's /join body:
#   [advanced_features], [vad], [sal], [parameters]

# ── [atem] — runtime control surface ────────────────────────────────
[atem]
# Channel is auto-generated when omitted:
#   "atem-convo-<app_id[..12]>-<ts>-<rand4>"
# Pin a fixed channel only when you need a stable name across runs.
# channel = "demo"

rtc_user_id = "0"           # human's RTC uid ("0" = server-assigned)

# Route through Agora's /hipaa/api/conversational-ai-agent/... endpoint
# instead of /api/.... Requires Agora Support to enable HIPAA on the
# project first.
hipaa = false

# Geofence — restrict media routing region.
# Valid: GLOBAL | NORTH_AMERICA | EUROPE | ASIA | JAPAN | INDIA
# GLOBAL (or omitting the field) → no geofence sent.
geofence = "GLOBAL"

# Avatar opt-in. Defaults to false even when [agent.avatar] is
# configured below — fleet `--background` launches won't burn avatar
# minutes by accident. Note: avatar + encryption is currently
# incompatible (the avatar vendor joins the channel unencrypted).
enable_avatar = false

# RTC encryption. mode = 0 → off; the [atem.encryption] block is
# ignored entirely. When mode > 0, both the local browser SDK and the
# agent join with these settings — they MUST match exactly or audio
# fails silently.
[atem.encryption]
mode = 0
# key  = "your-key-here"                                  # required when mode > 0
# salt = "Q4mTLy5h9qtD46vrdMgotPH9WrZxDsLxThPD9vtlf+o="    # base64-32-bytes; required for gcm2 modes (7, 8)
# Agora encryption_mode integer reference:
#   1 AES_128_XTS         5 AES_128_GCM
#   2 AES_128_ECB         6 AES_256_GCM
#   3 AES_256_XTS         7 AES_128_GCM2  (needs salt)
#   4 SM4_128_ECB         8 AES_256_GCM2  (needs salt; recommended)
# Generate a fresh salt with:  openssl rand -base64 32

# ── [agent] — everything about the AI agent ─────────────────────────
[agent]
user_id           = "1001"   # the agent's RTC uid (voice)
idle_timeout_secs = 120      # server-side safety timeout (seconds)

# Presets — comma-separated. atem splits on `,` to render checkboxes
# on the web page (all checked by default); selected names are joined
# back with `,` and forwarded as `properties.preset` in the /join body.
# Empty / omitted → no presets sent (agent runs from the explicit
# [agent.llm] / [agent.asr] / [agent.tts] blocks below).
preset = "expertise_ai_poc, _akool_test_expertise"

# ── Avatar (optional) ────────────────────────────────────────────────
# Declaring [agent.avatar] makes the avatar block AVAILABLE; whether
# it actually goes into the /join body is gated by `enable_avatar`
# under [atem] (or the "Enable Avatar" checkbox on the web page).
#
# atem auto-generates agora_channel (= voice channel), agora_uid
# (random 5-digit), and agora_token (minted from active project's
# appid + cert) when not provided in [agent.avatar.params].
#
# vendor + avatar_id are required by Agora.
#
# [agent.avatar]
# vendor    = "akool"
# avatar_id = "dvp_Sean_agora"
#
# [agent.avatar.params]
# api_key     = "<vendor api key>"
# host        = "ws://..."                # vendor-specific endpoint
# agora_appid = "..."                     # override project for minting
# agora_token = "..."                     # pre-minted; atem uses verbatim

# ── LLM ──────────────────────────────────────────────────────────────
[agent.llm]
url              = "https://api.groq.com/openai/v1/chat/completions"
api_key          = "<llm api key>"
greeting_message = "Hi, how can I help?"
failure_message  = "Error, please hold on."

[[agent.llm.system_messages]]
role    = "system"
content = "You are a helpful conversational AI agent."

[agent.llm.params]
model = "openai/gpt-oss-120b"

# ── ASR ──────────────────────────────────────────────────────────────
[agent.asr]
vendor   = "soniox"
language = "en-US"

[agent.asr.params]
api_key        = "<asr api key>"
language_hints = ["en"]
model          = "stt-rt-v3"

[agent.asr.params.turn_detector]
validate_asr_result_timestamp = false

# ── TTS ──────────────────────────────────────────────────────────────
[agent.tts]
vendor = "minimax"

[agent.tts.params]
key                   = "<tts api key>"
group_id              = "<minimax group id>"
model                 = "speech-02-turbo"
url                   = "wss://api-uw.minimax.io/ws/v1/t2a_v2"
english_normalization = true

[agent.tts.params.voice_setting]
voice_id = "pvc_voice_pamela_spanish_0919"
emotion  = "happy"

[agent.tts.params.audio_setting]
sample_rate = 16000

# ── Pass-through tables (forwarded verbatim to Agora /join) ─────────
# Required for live transcription. Without `enable_rtm = true`,
# `data_channel = "rtm"`, and `transcript.enable_words = true`, the
# agent runs but never streams transcripts.

[advanced_features]
enable_rtm   = true
enable_sal   = true
enable_aivad = false

[vad]
silence_duration_ms = 800

[sal]
sal_mode = "locking"

[parameters]
audio_scenario = "default"
data_channel   = "rtm"       # transcripts via RTM (not RTC data stream)
# enable_dump  = true        # Agora server-side audio dump — enable only
                             # when troubleshooting with Agora support

[parameters.transcript]
enable_words = true

[parameters.turn_detector]
validate_asr_result_timestamp = false
